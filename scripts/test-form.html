<!doctype html>
<html>
<head><title>Test Apply Form</title></head>
<body>
<h1>Apply for Software Engineer</h1>
<form id="apply-form" onsubmit="event.preventDefault(); document.getElementById('result').innerText = 'Thank you! Your application has been submitted.';">
  <div>
    <label for="first_name">First name</label>
    <input type="text" id="first_name" name="first_name" required />
  </div>
  <div>
    <label for="last_name">Last name</label>
    <input type="text" id="last_name" name="last_name" required />
  </div>
  <div>
    <label for="email">Email address</label>
    <input type="email" id="email" name="email" required />
  </div>
  <div>
    <label for="phone">Phone number</label>
    <input type="tel" id="phone" name="phone" required />
  </div>
  <div>
    <label for="linkedin">LinkedIn URL</label>
    <input type="url" id="linkedin" name="linkedin" />
  </div>
  <div>
    <label for="city">City</label>
    <input type="text" id="city" name="city" />
  </div>
  <div>
    <label for="country">Country</label>
    <select id="country" name="country" required>
      <option value="">Select country</option>
      <option value="id">Indonesia</option>
      <option value="sg">Singapore</option>
      <option value="us">United States</option>
    </select>
  </div>
  <div>
    <label for="cover_letter">Cover letter</label>
    <textarea id="cover_letter" name="cover_letter"></textarea>
  </div>
  <div>
    <label><input type="checkbox" id="consent" name="consent" required /> I agree to the privacy policy</label>
  </div>
  <button type="submit">Submit application</button>
</form>
<div id="result" style="margin-top:16px; color:green;"></div>
</body>
</html>
