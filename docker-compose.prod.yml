services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: jobflow-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@shared-postgres:5432/jobflow
      REDIS_HOST: shared-redis
      REDIS_PORT: 6379
      NODE_ENV: production
      PORT: 3003
    depends_on:
      - scraper
    ports:
      - '3003:3003'
    networks:
      - default
      - shared

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    container_name: jobflow-scraper
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@shared-postgres:5432/jobflow
      REDIS_HOST: shared-redis
      REDIS_PORT: 6379
      NODE_ENV: production
    networks:
      - default
      - shared

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: jobflow-web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      API_URL: http://api:3003/api
      DATABASE_URL: postgresql://postgres:postgres@shared-postgres:5432/jobflow
    depends_on:
      - api
    ports:
      - '3000:3000'
    networks:
      - default
      - shared

networks:
  default:
  shared:
    external: true
