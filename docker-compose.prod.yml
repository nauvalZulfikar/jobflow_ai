services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: jobflow-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:1bf57b0b91f206e45acdc9c0baf51289@shared-postgres:5432/jobflow
      REDIS_HOST: shared-redis
      REDIS_PORT: 6379
      NODE_ENV: production
      PORT: 3003
      PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium
    depends_on:
      - scraper
    ports:
      - '3003:3003'
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - default
      - shared

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    container_name: jobflow-scraper
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:1bf57b0b91f206e45acdc9c0baf51289@shared-postgres:5432/jobflow
      REDIS_HOST: shared-redis
      REDIS_PORT: 6379
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - default
      - shared

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: jobflow-web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      API_URL: http://api:3003/api
      DATABASE_URL: postgresql://postgres:1bf57b0b91f206e45acdc9c0baf51289@shared-postgres:5432/jobflow
    depends_on:
      - api
    ports:
      - '3000:3000'
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - default
      - shared

networks:
  default:
  shared:
    external: true
